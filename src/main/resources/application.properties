spring.application.name=notesapi

# Database connection using Environment Variables (with local fallback defaults)
spring.datasource.url=jdbc:mysql://${DB_HOST:host.docker.internal}:${DB_PORT:3306}/${DB_NAME:notesdb}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:agrim_dev_14}

# Hibernate config
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Pull the API key dynamically from your environment/system variables
groq.api.key=${GROQ_API_KEY}